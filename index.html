<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS Maths: Standard Deviation Master</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MathJax for nice math formulas -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        .hidden { display: none; }
        .solution-box {
            background-color: #f1f5f9;
            border-left: 5px solid #3b82f6;
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto p-6">
        <!-- Lesson Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-900">Standard Deviation Tool</h1>
            <p class="text-gray-600 mt-2 italic">"Mastering the average distance from the average"</p>
        </div>

        <!-- App Container -->
        <div id="app" class="bg-white rounded-3xl shadow-2xl p-8 border border-gray-200">
            
            <!-- Type Selector -->
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <span id="topic-label" class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Loading Topic...</span>
                <button onclick="newQuestion()" class="text-blue-600 hover:underline font-bold text-sm">🔄 Refresh Question</button>
            </div>

            <!-- Question Display -->
            <div id="question-area" class="mb-8">
                <h2 id="question-text" class="text-2xl font-bold text-gray-800 mb-4"></h2>
                <div id="data-display" class="flex flex-wrap gap-3"></div>
            </div>

            <!-- Interaction -->
            <div id="input-section" class="space-y-4">
                <div id="numeric-input-wrapper">
                    <label class="block text-sm font-semibold text-gray-500 mb-1">Your Answer (round to 2 decimal places):</label>
                    <input type="number" id="answer-field" step="0.01" class="w-full md:w-48 text-2xl p-3 border-2 border-gray-300 rounded-xl focus:border-blue-500 focus:outline-none">
                </div>
                
                <div id="mcq-wrapper" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4"></div>

                <button id="submit-btn" onclick="checkAnswer()" class="bg-blue-600 hover:bg-blue-700 text-white w-full md:w-auto px-10 py-4 rounded-2xl font-black text-lg transition-transform active:scale-95">
                    Check My Answer
                </button>
            </div>

            <!-- Feedback & Solution -->
            <div id="feedback-area" class="mt-8 hidden animate-fade-in">
                <div id="status-message" class="text-2xl font-black mb-4"></div>
                <div id="solution-content" class="solution-box text-gray-700"></div>
                <button onclick="newQuestion()" class="mt-6 bg-black text-white px-8 py-3 rounded-xl font-bold hover:opacity-80">Try Next Question</button>
            </div>

        </div>
    </div>

    <script>
        let currentQ = {};

        function newQuestion() {
            // UI Reset
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('submit-btn').classList.remove('hidden');
            document.getElementById('answer-field').value = '';
            document.getElementById('numeric-input-wrapper').classList.remove('hidden');
            document.getElementById('mcq-wrapper').classList.add('hidden');

            // Randomly choose between Example 1, 2, 3, or 4
            const choice = Math.floor(Math.random() * 4) + 1;
            
            if (choice === 1) generateRawData();
            if (choice === 2) generateConsistency();
            if (choice === 3) generateGroupedData();
            if (choice === 4) generateEmpirical();

            if (window.MathJax) MathJax.typeset();
        }

        function generateRawData() {
            document.getElementById('topic-label').innerText = "Raw Data Calculation (Ex 1)";
            const n = 5;
            const data = Array.from({length: n}, () => Math.floor(Math.random() * 40) + 10);
            const sum = data.reduce((a, b) => a + b, 0);
            const mean = sum / n;
            const sumSq = data.reduce((a, b) => a + (b * b), 0);
            const variance = (sumSq / n) - (mean * mean);
            const sigma = Math.sqrt(variance);

            currentQ = {
                answer: parseFloat(sigma.toFixed(2)),
                solution: `
                    <p class="font-bold mb-2">Step-by-Step Solution:</p>
                    <ol class="list-decimal ml-5 space-y-2">
                        <li><strong>Find $n$:</strong> There are ${n} items.</li>
                        <li><strong>Find Mean ($\bar{x}$):</strong> Total is ${sum}. Mean = ${sum} ÷ 5 = ${mean}.</li>
                        <li><strong>Sum of Squares ($\sum x^2$):</strong> ${data.map(d => d+'²').join(' + ')} = ${sumSq}.</li>
                        <li><strong>Calculate Variance ($\sigma^2$):</strong> $\\frac{${sumSq}}{5} - ${mean}^2 = ${variance.toFixed(2)}$.</li>
                        <li><strong>Final Standard Deviation ($\sigma$):</strong> $\\sqrt{${variance.toFixed(2)}} = ${sigma.toFixed(2)}$.</li>
                    </ol>
                `
            };

            document.getElementById('question-text').innerText = "Calculate the standard deviation (σ) for this data set:";
            document.getElementById('data-display').innerHTML = data.map(d => `<div class="bg-blue-50 border-2 border-blue-200 px-6 py-3 rounded-2xl font-mono text-xl text-blue-800 font-bold">${d}</div>`).join('');
        }

        function generateConsistency() {
            document.getElementById('topic-label').innerText = "Consistency Concept (Ex 2)";
            const s1 = (Math.random() * 2 + 1).toFixed(1);
            const s2 = (Math.random() * 5 + 6).toFixed(1);
            
            currentQ = {
                answer: "A",
                solution: `
                    <p><strong>Concept:</strong> Standard deviation ($\sigma$) measures spread. A <strong>low $\sigma$</strong> means values are close to the average.</p>
                    <p>Machine A has $\sigma = ${s1}$, which is much lower than Machine B ($\sigma = ${s2}$).</p>
                    <p>Therefore, <strong>Machine A</strong> is more consistent.</p>
                `
            };

            document.getElementById('question-text').innerText = "Which machine is more consistent in its output?";
            document.getElementById('numeric-input-wrapper').classList.add('hidden');
            const mcq = document.getElementById('mcq-wrapper');
            mcq.classList.remove('hidden');
            mcq.innerHTML = `
                <button onclick="checkMCQ('A')" class="p-6 border-2 border-gray-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 text-xl font-bold">Machine A ($\sigma = ${s1}$)</button>
                <button onclick="checkMCQ('B')" class="p-6 border-2 border-gray-200 rounded-2xl hover:border-blue-500 hover:bg-blue-50 text-xl font-bold">Machine B ($\sigma = ${s2}$)</button>
            `;
            document.getElementById('data-display').innerHTML = "";
        }

        function generateGroupedData() {
            document.getElementById('topic-label').innerText = "Grouped Data (Ex 3)";
            const freq = [12, 18, 14, 6];
            const mids = [2.5, 7.5, 12.5, 17.5];
            const n = 50;
            let sumFx = 0; let sumFx2 = 0;
            for(let i=0; i<4; i++) {
                sumFx += freq[i] * mids[i];
                sumFx2 += freq[i] * (mids[i]**2);
            }
            const mean = sumFx / n;
            const variance = (sumFx2/n) - (mean**2);
            const sigma = Math.sqrt(variance);

            currentQ = {
                answer: parseFloat(sigma.toFixed(2)),
                solution: `
                    <p><strong>Worked Table Logic:</strong></p>
                    <ul class="list-disc ml-5 space-y-1">
                        <li><strong>n</strong> = 12 + 18 + 14 + 6 = 50</li>
                        <li><strong>$\sum fx$</strong> = ${sumFx}</li>
                        <li><strong>Mean ($\bar{x}$)</strong> = ${sumFx}/50 = ${mean}</li>
                        <li><strong>$\sum fx^2$</strong> = ${sumFx2}</li>
                        <li><strong>Variance ($\sigma^2$)</strong> = (${sumFx2}/50) - ${mean}² = ${variance.toFixed(2)}</li>
                        <li><strong>$\sigma$</strong> = $\\sqrt{${variance.toFixed(2)}} = ${sigma.toFixed(2)}$</li>
                    </ul>
                `
            };

            document.getElementById('question-text').innerText = "Estimate σ from the table below:";
            document.getElementById('data-display').innerHTML = `
                <table class="w-full text-left border">
                    <tr class="bg-gray-50 border-b"> <th class="p-2">Range</th> <th class="p-2">f</th> <th class="p-2">Mid(x)</th> </tr>
                    <tr> <td class="p-2 border">0-5</td> <td class="p-2 border">12</td> <td class="p-2 border">2.5</td> </tr>
                    <tr> <td class="p-2 border">5-10</td> <td class="p-2 border">18</td> <td class="p-2 border">7.5</td> </tr>
                    <tr> <td class="p-2 border">10-15</td> <td class="p-2 border">14</td> <td class="p-2 border">12.5</td> </tr>
                    <tr> <td class="p-2 border">15-20</td> <td class="p-2 border">6</td> <td class="p-2 border">17.5</td> </tr>
                </table>
            `;
        }

        function generateEmpirical() {
            document.getElementById('topic-label').innerText = "68-95-99.7 Rule (Ex 4)";
            const target = 29.5;
            currentQ = {
                answer: 0.15,
                solution: `
                    <p><strong>Rule Check:</strong></p>
                    <p>1. Target 29.5 is exactly 3 standard deviations (0.3g) below the mean (29.8).</p>
                    <p>2. We know 99.7% of items are within 3 standard deviations.</p>
                    <p>3. This leaves 0.3% outside that range.</p>
                    <p>4. We only want the "bottom" end, so divide 0.3% by 2 = <strong>0.15%</strong>.</p>
                `
            };

            document.getElementById('question-text').innerText = "A crisp packet machine has mean = 29.8g and σ = 0.1g. What is the % probability a packet is less than 29.5g?";
            document.getElementById('data-display').innerHTML = "";
        }

        function checkMCQ(val) {
            handleResult(val === currentQ.answer);
        }

        function checkAnswer() {
            const user = parseFloat(document.getElementById('answer-field').value);
            handleResult(Math.abs(user - currentQ.answer) < 0.05);
        }

        function handleResult(isCorrect) {
            const fb = document.getElementById('feedback-area');
            const msg = document.getElementById('status-message');
            const sol = document.getElementById('solution-content');
            
            fb.classList.remove('hidden');
            document.getElementById('submit-btn').classList.add('hidden');
            
            if (isCorrect) {
                msg.innerText = "Correct! Well done.";
                msg.className = "text-2xl font-black text-green-600 mb-4";
            } else {
                msg.innerText = "Not quite. Check the working:";
                msg.className = "text-2xl font-black text-red-600 mb-4";
            }
            
            sol.innerHTML = currentQ.solution;
            if (window.MathJax) MathJax.typeset();
        }

        window.onload = newQuestion;
    </script>
</body>
</html>
